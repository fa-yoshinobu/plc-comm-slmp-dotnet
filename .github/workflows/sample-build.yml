name: Sample build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sample-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore samples
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem samples -Recurse -Filter *.csproj | ForEach-Object {
            dotnet restore $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Build samples
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem samples -Recurse -Filter *.csproj | ForEach-Object {
            dotnet build $_.FullName -c Release --no-restore
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
