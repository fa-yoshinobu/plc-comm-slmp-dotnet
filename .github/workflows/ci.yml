name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore PlcCommSlmp.sln

      - name: Build
        run: dotnet build PlcCommSlmp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PlcCommSlmp.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"
          if-no-files-found: ignore

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: docs/validation/reports/**
          if-no-files-found: ignore
