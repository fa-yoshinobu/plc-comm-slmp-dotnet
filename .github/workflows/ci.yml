name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout shared verification vectors
        uses: actions/checkout@v6
        with:
          repository: fa-yoshinobu/plc-comm-slmp-cross-verify
          ref: main
          path: plc-comm-slmp-cross-verify
          sparse-checkout: |
            specs/shared
          token: ${{ secrets.CROSS_VERIFY_REPO_TOKEN != '' && secrets.CROSS_VERIFY_REPO_TOKEN || github.token }}

      - name: Expose shared vectors at sibling path
        shell: pwsh
        run: |
          $source = Join-Path $env:GITHUB_WORKSPACE "plc-comm-slmp-cross-verify"
          $link = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) "plc-comm-slmp-cross-verify"
          if (Test-Path $link) {
            Remove-Item $link -Force -Recurse
          }
          New-Item -ItemType Junction -Path $link -Target $source | Out-Null

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore PlcComm.Slmp.sln

      - name: Build
        run: dotnet build PlcComm.Slmp.sln -c Release --no-restore

      - name: Test
        run: dotnet test PlcComm.Slmp.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Format check
        run: dotnet format PlcComm.Slmp.sln --verify-no-changes --no-restore

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/test-results.trx"
          if-no-files-found: ignore

      - name: Upload validation reports
        uses: actions/upload-artifact@v7
        with:
          name: validation-reports
          path: internal_docs/validation/reports/**
          if-no-files-found: ignore

      - name: Install docfx
        run: dotnet tool install -g docfx

      - name: Build docs
        run: docfx docfx.json

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
