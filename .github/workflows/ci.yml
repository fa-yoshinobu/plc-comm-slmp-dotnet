name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check canonical SLMP profile JSONs
        shell: pwsh
        run: .\scripts\update_slmp_profile_jsons.ps1 -FailIfChanged

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore PlcComm.Slmp.sln

      - name: Build
        run: dotnet build PlcComm.Slmp.sln -c Release --no-restore

      - name: Test
        run: dotnet test PlcComm.Slmp.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Format check
        run: dotnet format PlcComm.Slmp.sln --verify-no-changes --no-restore

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/test-results.trx"
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload validation reports
        uses: actions/upload-artifact@v7
        with:
          name: validation-reports
          path: internal_docs/validation/reports/**
          if-no-files-found: ignore
          retention-days: 7

  trigger-docs-rebuild:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs rebuild
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          if [ -z "$DOCS_REPO_TOKEN" ]; then
            echo "::notice::DOCS_REPO_TOKEN is not configured; skipping docs rebuild dispatch."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fa-yoshinobu/plc-comm-docs-site/dispatches \
            -d '{"event_type":"source-updated","client_payload":{"repo":"${{ github.repository }}"}}'
